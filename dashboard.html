<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Origen Lab</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#111111',
                        secundario: '#d1ebf7',
                        fondoPersonalizado: '#e9e3c9'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-fondoPersonalizado font-sans text-gray-900 min-h-screen">

    <header class="bg-principal text-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-lg font-black tracking-widest uppercase">Origen Lab <span class="text-secundario text-xs font-normal">| Panel de Control</span></h1>
            <div class="flex items-center gap-2">
                <span id="indicador-rango" class="text-xs bg-white/10 px-3 py-1.5 rounded-lg font-medium text-gray-300">Esta Semana</span>
                <button onclick="inicializarDashboard()" class="bg-secundario text-principal px-4 py-2 rounded-full text-xs font-bold hover:bg-white transition flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i> Sincronizar
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2 text-xs font-bold uppercase text-gray-500">
                <i class="fas fa-calendar-alt text-base text-principal"></i> Rango de Métricas y Órdenes:
            </div>
            <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto">
                <div class="flex items-center gap-1.5 text-xs">
                    <span class="text-gray-400 font-medium">Desde:</span>
                    <input type="date" id="fecha-desde" onchange="aplicarFiltroFechasManual()" class="p-2 border rounded-xl outline-none text-xs font-bold">
                </div>
                <div class="flex items-center gap-1.5 text-xs">
                    <span class="text-gray-400 font-medium">Hasta:</span>
                    <input type="date" id="fecha-hasta" onchange="aplicarFiltroFechasManual()" class="p-2 border rounded-xl outline-none text-xs font-bold">
                </div>
                <button onclick="configurarSemanaActual()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-3 py-2 rounded-xl text-xs transition">
                    Esta Semana
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ventas Facturadas</p>
                <h3 id="meta-ingresos" class="text-2xl font-black text-gray-900 mt-1">$0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Órdenes</p>
                <h3 id="meta-activos" class="text-2xl font-black text-amber-600 mt-1">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ticket Promedio</p>
                <h3 id="meta-ticket" class="text-2xl font-black text-indigo-600 mt-1">$0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Día Más Fuerte</p>
                <h3 id="meta-dia" class="text-sm font-black text-gray-800 mt-2 truncate">---</h3>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
                <input type="text" id="buscador" oninput="filtrarPedidos()" placeholder="Buscar por ID, Cliente o Celular..." class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border rounded-xl outline-none text-sm focus:border-principal">
            </div>
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
                <button onclick="filtrarPorEstado('Todos')" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold bg-principal text-white shrink-0">Todos</button>
                <button onclick="filtrarPorEstado('Pendiente')" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 shrink-0">Pendientes</button>
                <button onclick="filtrarPorEstado('En Proceso')" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 shrink-0">En Proceso</button>
                <button onclick="filtrarPorEstado('Pendiente de Pago')" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 shrink-0">Pendiente de Pago</button>
                <button onclick="filtrarPorEstado('Finalizado')" class="filtro-btn px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 shrink-0">Finalizados</button>
            </div>
        </div>

        <div>
            <h3 class="text-sm font-black uppercase tracking-wider mb-4 text-gray-800 flex items-center gap-2">
                <span class="w-2 h-4 bg-principal rounded-full"></span> Panel de Tarjetas Activas
            </h3>
            <div id="contenedor-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

    </div>

    <script>
        const CONFIG = {
            URL_API: 'https://script.google.com/macros/s/AKfycbwvICuQ5Z0NAwFSGwOJJ0YxYUmf7C0K4OOWSN8DqtV3DG4RcpfVd26aPfcUcwqlCqd1/exec' // <- PEGA AQUÍ TU URL ACTUALIZADA
        };

        let pedidosMapeadosLocales = [];
        let estadoFiltroActual = 'Todos';

        function configurarSemanaActual() {
            document.getElementById('indicador-rango').innerText = "Esta Semana (Lun - Dom)";
            
            const hoy = new Date();
            const diaSemana = hoy.getDay(); 
            const diferenciaLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
            
            const lunes = new Date(hoy);
            lunes.setDate(hoy.getDate() + diferenciaLunes);
            const domingo = new Date(lunes);
            domingo.setDate(lunes.getDate() + 6);
            
            document.getElementById('fecha-desde').value = lunes.toISOString().split('T')[0];
            document.getElementById('fecha-hasta').value = domingo.toISOString().split('T')[0];
            
            if(pedidosMapeadosLocales.length > 0) filtrarPedidos();
        }

        function aplicarFiltroFechasManual() {
            document.getElementById('indicador-rango').innerText = "Rango Personalizado";
            filtrarPedidos();
        }

        async function inicializarDashboard() {
            if(!document.getElementById('fecha-desde').value) configurarSemanaActual();
            
            const contenedor = document.getElementById('contenedor-cards');
            contenedor.innerHTML = `<div class="col-span-full text-center py-12"><i class="fas fa-spinner fa-spin text-2xl text-principal mb-2"></i><p class="text-sm font-bold">Cargando base de datos segura...</p></div>`;
            
            const nombreFuncion = "origenLabDash_" + Math.round(Math.random() * 100000);
            window[nombreFuncion] = function(datosRaw) {
                // SE CORRIGEN LOS UNDEFINED: MAPEO EXACTO CON LAS CABECERAS REALES DE TU EXCEL
                pedidosMapeadosLocales = datosRaw.map(p => {
                    return {
                        id: p.Pedido_ID || 'Sin ID',
                        fecha: p.Fecha || '',
                        cliente: p.Cliente_Nombre || 'Cliente Anónimo',
                        direccion: p.Direccion || '',
                        ciudad: p.Ciudad || '',
                        whatsapp: p.Whatsapp ? p.Whatsapp.toString().trim() : '',
                        pago: p.Metodo_Pago || '',
                        productos: p.Productos_Detalle || 'Detalle no registrado',
                        total: Number(p.Total) || 0,
                        estado: p.Estado ? p.Estado.toString().trim() : 'Pendiente'
                    };
                });

                filtrarPedidos();
                document.body.removeChild(script);
                delete window[nombreFuncion];
            };

            const script = document.createElement('script');
            script.src = CONFIG.URL_API + "?accion=leerPedidos&callback=" + nombreFuncion;
            document.body.appendChild(script);
        }

        function filtrarPedidos() {
            let busqueda = document.getElementById('buscador').value.toLowerCase().trim();
            let desde = new Date(document.getElementById('fecha-desde').value + "T00:00:00");
            let hasta = new Date(document.getElementById('fecha-hasta').value + "T23:59:59");

            // 1. Filtrado temporal por Fechas (Afecta métricas altas)
            let filtradosPorFecha = pedidosMapeadosLocales.filter(p => {
                if(!p.fecha) return false;
                let fechaPedido = new Date(p.fecha);
                return fechaPedido >= desde && fechaPedido <= hasta;
            });

            actualizarMetricasEstructurales(filtradosPorFecha);

            // 2. Filtrado secundario por buscador textual y estado de botón
            let muestraFinal = filtradosPorFecha.filter(p => {
                let cumpleEstado = (estadoFiltroActual === 'Todos') || (p.estado === estadoFiltroActual);
                let cumpleBusqueda = !busqueda || 
                                     p.id.toLowerCase().includes(busqueda) ||
                                     p.cliente.toLowerCase().includes(busqueda) ||
                                     p.whatsapp.includes(busqueda);
                return cumpleEstado && cumpleBusqueda;
            });

            renderizarCardsEstructurales(muestraFinal);
        }

        function actualizarMetricasEstructurales(pedidos) {
            let ingresos = 0;
            let conteoDias = {};

            pedidos.forEach(p => {
                ingresos += p.total;
                if(p.fecha) {
                    let diaIso = p.fecha.split("T")[0] || p.fecha.substring(0,10);
                    conteoDias[diaIso] = (conteoDias[diaIso] || 0) + 1;
                }
            });

            let diaMasVentas = "---";
            let maxVentas = 0;
            for(let dia in conteoDias) {
                if(conteoDias[dia] > maxVentas) {
                    maxVentas = conteoDias[dia];
                    diaMasVentas = dia;
                }
            }

            document.getElementById('meta-ingresos').innerText = `$${ingresos.toLocaleString('es-CO')}`;
            document.getElementById('meta-activos').innerText = pedidos.length;
            document.getElementById('meta-ticket').innerText = pedidos.length ? `$${Math.round(ingresos / pedidos.length).toLocaleString('es-CO')}` : "$0";
            document.getElementById('meta-dia').innerText = diaMasVentas;
        }

        function renderizarCardsEstructurales(pedidos) {
            const contenedor = document.getElementById('contenedor-cards');
            contenedor.innerHTML = '';

            // ORDEN LOGICO: Activos arriba, finalizados se van al fondo automáticamente
            let activos = pedidos.filter(p => p.estado !== 'Finalizado');
            let finalizados = pedidos.filter(p => p.estado === 'Finalizado');
            let listaOrdenada = [...activos, ...finalizados];

            if(listaOrdenada.length === 0) {
                contenedor.innerHTML = `<p class="col-span-full text-center py-12 text-xs font-bold text-gray-500 bg-white rounded-2xl border">Ninguna orden coincide con este criterio.</p>`;
                return;
            }

            listaOrdenada.forEach(p => {
                let colorEstado = 'bg-gray-100 text-gray-800';
                if(p.estado === 'Pendiente') colorEstado = 'bg-amber-100 text-amber-800 border border-amber-300';
                if(p.estado === 'En Proceso') colorEstado = 'bg-blue-100 text-blue-800 border border-blue-300';
                if(p.estado === 'Pendiente de Pago') colorEstado = 'bg-purple-100 text-purple-800 border border-purple-300';
                if(p.estado === 'Finalizado') colorEstado = 'bg-green-100 text-green-800 opacity-60';

                const card = `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-200 flex flex-col justify-between space-y-4 ${p.estado === 'Finalizado' ? 'bg-gray-50/60' : ''}">
                        <div class="space-y-2">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">${p.id}</span>
                                <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded-full ${colorEstado}">${p.estado}</span>
                            </div>
                            <div>
                                <h4 class="font-black text-base text-gray-950 tracking-tight">${p.cliente}</h4>
                                <p class="text-xs text-gray-500 mt-0.5"><i class="fas fa-map-marker-alt text-gray-400"></i> ${p.ciudad} • ${p.direccion}</p>
                            </div>
                            <div class="bg-secundario/30 p-3 rounded-xl border border-gray-100">
                                <p class="text-xs font-bold text-gray-800 leading-relaxed">${p.productos.replace(/\|/g, '<br>• ')}</p>
                            </div>
                        </div>

                        <div class="space-y-3 pt-2 border-t">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-gray-400 uppercase">Cobrado</span>
                                <span class="font-black text-gray-900 text-base">$${p.total.toLocaleString('es-CO')}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-[9px] font-black text-gray-400 uppercase mb-1">Estado</label>
                                    <select onchange="cambiarEstadoPedido('${p.id}', this.value)" class="w-full text-xs p-2 border rounded-lg bg-gray-50 font-bold outline-none cursor-pointer focus:border-principal">
                                        <option value="Pendiente" ${p.estado === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                                        <option value="En Proceso" ${p.estado === 'En Proceso' ? 'selected' : ''}>En Proceso</option>
                                        <option value="Pendiente de Pago" ${p.estado === 'Pendiente de Pago' ? 'selected' : ''}>Pendiente de Pago</option>
                                        <option value="Finalizado" ${p.estado === 'Finalizado' ? 'selected' : ''}>Finalizado</option>
                                    </select>
                                </div>
                                <div class="flex items-end">
                                    <button onclick="notificarWhatsApp('${p.id}')" class="w-full bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 rounded-lg flex items-center justify-center gap-1.5 transition">
                                        <i class="fab fa-whatsapp text-sm"></i> Notificar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += card;
            });
        }

        function cambiarEstadoPedido(id, nuevoEstado) {
            const nombreFuncionEscribir = "origenLabWrite_" + Math.round(Math.random() * 100000);
            
            window[nombreFuncionEscribir] = function(res) {
                if(res.success) {
                    let item = pedidosMapeadosLocales.find(p => p.id === id);
                    if(item) item.estado = nuevoEstado;
                    filtrarPedidos();
                } else {
                    alert("Error al actualizar la celda en Sheets.");
                }
                document.body.removeChild(script);
                delete window[nombreFuncionEscribir];
            };

            const script = document.createElement('script');
            script.src = CONFIG.URL_API + `?accion=actualizarEstado&pedidoId=${encodeURIComponent(id)}&nuevoEstado=${encodeURIComponent(nuevoEstado)}&callback=${nombreFuncionEscribir}`;
            document.body.appendChild(script);
        }

        function notificarWhatsApp(id) {
            // SE CORRIGE WHATSAPP: Busca el estado real actual en memoria para enviar el texto correcto
            let p = pedidosMapeadosLocales.find(item => item.id === id);
            if(!p) return;
            
            let msg = "";
            if (p.estado === "Pendiente") {
                msg = `¡Hola ${p.cliente}! Recibimos tu pedido con el código *${p.id}* en Origen Lab. Ya quedó registrado y está en cola de revisión logística. ¡Muchas gracias por tu compra!`;
            } else if (p.estado === "En Proceso") {
                msg = `¡Buenas noticias, ${p.cliente}! Tu pedido *${p.id}* ya entró a taller de estampado y empaque. Muy pronto te daremos novedades sobre tu guía de despacho. 👕⚡`;
            } else if (p.estado === "Pendiente de Pago") {
                msg = `Hola ${p.cliente}, te escribimos de Origen Lab. Tenemos listo tu pedido *${p.id}*, quedamos muy atentos al comprobante de transferencia para proceder con el despacho hoy mismo.`;
            } else if (p.estado === "Finalizado") {
                msg = `¡Hola ${p.cliente}! Tu pedido *${p.id}* ya figura como entregado. Queríamos saludarte y saber cómo te fue con las prendas. ¿Te gustó el tallaje y la calidad del estampado? Tu respuesta nos ayuda un montón a seguir mejorando en Origen Lab. 🙌👕`;
            }

            window.open(`https://api.whatsapp.com/send?phone=57${p.whatsapp}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filtrarPorEstado(estado) {
            estadoFiltroActual = estado;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.replace('bg-principal', 'bg-gray-100');
                btn.classList.replace('text-white', 'text-gray-600');
            });
            event.target.classList.replace('bg-gray-100', 'bg-principal');
            event.target.classList.replace('text-gray-600', 'text-white');
            filtrarPedidos();
        }

        window.onload = inicializarDashboard;
    </script>
</body>
</html>
